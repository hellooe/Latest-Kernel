name: Reusable Kernel Build

on:
  workflow_call:
    inputs:
      kernel_version:
        description: 'Kernel version (e.g., "6.12", "7.0") – will use linux-${version}.y branch'
        required: true
        type: string
      apply_bbr3_patch:
        description: 'Whether to apply BBRv3 patch'
        required: false
        type: boolean
        default: false
      config_file:
        description: 'Path to .config file in repo (e.g., "config")'
        required: false
        default: 'config'
        type: string
      release_tag_prefix:
        description: 'Prefix for release tag (e.g., "bbrv3-" or "v")'
        required: true
        type: string
      release_name_prefix:
        description: 'Prefix for release name'
        required: true
        type: string
      bbr_patch_url:
        description: 'URL to download BBRv3 patch file (MUST be provided when apply_bbr3_patch is true)'
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        description: 'GitHub token for creating releases'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo rm -rf /usr/share/swift /usr/local/.ghcup /usr/share/az_*

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev libssl-dev libelf-dev \
            bison flex bc rsync debhelper dpkg-dev \
            fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils libdw-dev jq \
            git gcc-13

      - name: Obtain kernel source (with branch validation)
        env:
          VERSION: ${{ inputs.kernel_version }}
        run: |
          BRANCH="linux-${VERSION}.y"
          if ! git ls-remote --heads git://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git "$BRANCH" | grep -q "$BRANCH"; then
            echo "ERROR: Branch $BRANCH does NOT exist in the stable kernel tree"
            exit 1
          fi
          git clone --depth 1 --branch "$BRANCH" \
            git://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux-source

      - name: Apply BBRv3 patch (with fallback methods)
        if: ${{ inputs.apply_bbr3_patch == true }}
        working-directory: ./linux-source
        env:
          PATCH_URL: ${{ inputs.bbr_patch_url }}
        run: |
          if [ -z "$PATCH_URL" ]; then
            echo "ERROR: bbr_patch_url must be provided when apply_bbr3_patch is true"
            exit 1
          fi

          if ! wget -O bbr3.patch "$PATCH_URL"; then
            echo "ERROR: Failed to download patch from $PATCH_URL"
            exit 1
          fi

          git config user.email "builder@localhost"
          git config user.name "Kernel Builder"

          if git am bbr3.patch 2>/dev/null; then
            echo "BBRv3 patch applied"
          elif git apply --whitespace=fix bbr3.patch 2>/dev/null; then
            echo "Patch applied with git apply"
            git add -A
            git commit -m "Apply BBRv3 patch"
          elif patch -p1 < bbr3.patch 2>/dev/null; then
            echo "Patch applied with patch"
            git add -A
            git commit -m "Apply BBRv3 patch"
          else
            echo "ERROR: Failed to apply patch with all methods (git am, git apply, patch)"
            exit 1
          fi

      - name: Configure kernel
        working-directory: ./linux-source
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
        run: |
          CONFIG_PATH="../$CONFIG_FILE"
          if [[ ! -f "$CONFIG_PATH" ]]; then
            echo "ERROR: Config file not found"
            exit 1
          fi
          cp "$CONFIG_PATH" .config
          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS
          make olddefconfig

      - name: Get final kernel version
        id: final_version
        working-directory: ./linux-source
        run: |
          FULL_VERSION=$(make kernelrelease)
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Compile kernel
        working-directory: ./linux-source
        env:
          CC: gcc-13
        run: |
          make -j$(nproc) bindeb-pkg

      - name: Collect artifacts
        run: |
          version="${{ steps.final_version.outputs.version }}"
          mkdir -p debs
          find . -maxdepth 1 -type f -name 'linux-image-*.deb' ! -name '*dbg*' -exec mv {} debs/ \;
          find . -maxdepth 1 -type f -name 'linux-headers-*.deb' -exec mv {} debs/ \;
          if [[ -z $(ls debs/linux-image-*.deb 2>/dev/null) ]]; then
            echo "ERROR: Missing required .deb files"
            exit 1
          fi
          tar -czf kernel-${version}.tar.gz -C debs .
          tar -czf config-${version}.tar.gz -C linux-source .config

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag_prefix }}${{ steps.final_version.outputs.version }}
          name: ${{ inputs.release_name_prefix }} ${{ steps.final_version.outputs.version }}
          body: |
            Built from Linux stable tree (version ${{ inputs.kernel_version }})
            ${{ inputs.apply_bbr3_patch == true && format('BBRv3 patch applied from: {0}', inputs.bbr_patch_url) || 'No extra patches applied' }}
          files: |
            kernel-${{ steps.final_version.outputs.version }}.tar.gz
            config-${{ steps.final_version.outputs.version }}.tar.gz
          overwrite_files: true
