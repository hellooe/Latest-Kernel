name: Reusable Kernel Build

on:
  workflow_call:
    inputs:
      kernel_version:
        description: 'Kernel version (e.g., "6.17", "7.0") – will use linux-${version}.y branch'
        required: true
        type: string
      apply_bbr3_patch:
        description: 'Whether to apply BBRv3 patch from CachyOS'
        required: false
        type: boolean
        default: false
      config_file:
        description: 'Path to .config file in repo (e.g., "config")'
        required: false
        default: 'config'
        type: string
      release_tag_prefix:
        description: 'Prefix for release tag (e.g., "bbrv3-" or "v")'
        required: true
        type: string
      release_name_prefix:
        description: 'Prefix for release name'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        description: 'GitHub token for creating releases'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout repository (for config file)
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo rm -rf /usr/share/swift /usr/local/.ghcup /usr/share/az_*
          docker rmi $(docker images -q) || true
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev libssl-dev libelf-dev \
            bison flex bc rsync debhelper dpkg-dev \
            fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils libdw-dev jq \
            git gcc-13

      - name: Obtain kernel source
        env:
          VERSION: ${{ inputs.kernel_version }}
        run: |
          BRANCH="linux-${VERSION}.y"
          echo "Cloning branch $BRANCH from stable kernel tree..."
          git clone --depth 1 --branch "$BRANCH" \
            git://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux-source

      - name: Apply BBRv3 patch (if requested)
        if: ${{ inputs.apply_bbr3_patch == true }}
        working-directory: ./linux-source
        env:
          VERSION: ${{ inputs.kernel_version }}
        run: |
          PATCH_URL="https://raw.githubusercontent.com/CachyOS/kernel-patches/refs/heads/master/${VERSION}/0002-bbr3.patch"
          echo "Downloading BBRv3 patch from $PATCH_URL"
          wget -O 0002-bbr3.patch "$PATCH_URL"
          git config user.email "builder@localhost"
          git config user.name "Kernel Builder"
          if ! git am 0002-bbr3.patch; then
            echo "ERROR: Failed to apply BBRv3 patch"
            exit 1
          fi
          echo "BBRv3 patch applied successfully"

      - name: Configure kernel
        working-directory: ./linux-source
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
        run: |
          CONFIG_PATH="../$CONFIG_FILE"
          if [[ ! -f "$CONFIG_PATH" ]]; then
            echo "ERROR: Config file not found: $CONFIG_PATH"
            exit 1
          fi
          cp "$CONFIG_PATH" .config
          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS
          make olddefconfig

      - name: Get final kernel version
        id: final_version
        working-directory: ./linux-source
        run: |
          FULL_VERSION=$(make kernelrelease)
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Final kernel version: $FULL_VERSION"

      - name: Compile kernel
        working-directory: ./linux-source
        env:
          CC: gcc-13
        run: |
          make -j$(nproc) bindeb-pkg

      - name: Collect artifacts
        run: |
          version="${{ steps.final_version.outputs.version }}"
          mkdir -p debs
          find . -maxdepth 1 -type f -name 'linux-image-*.deb' ! -name '*dbg*' -exec mv {} debs/ \;
          find . -maxdepth 1 -type f -name 'linux-headers-*.deb' -exec mv {} debs/ \;
          if [[ -z $(ls debs/linux-image-*.deb 2>/dev/null) ]]; then
            echo "ERROR: Missing required .deb files"
            exit 1
          fi
          tar -czf kernel-${version}.tar.gz -C debs .
          tar -czf config-${version}.tar.gz -C linux-source .config

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag_prefix }}${{ steps.final_version.outputs.version }}
          name: ${{ inputs.release_name_prefix }} ${{ steps.final_version.outputs.version }}
          body: |
            Built from Linux stable tree (version ${{ inputs.kernel_version }})
            ${{ inputs.apply_bbr3_patch == true && 'BBRv3 patch applied (from CachyOS)' || 'No extra patches applied' }}
            Configuration: `${{ inputs.config_file }}` from this repo.
          files: |
            kernel-${{ steps.final_version.outputs.version }}.tar.gz
            config-${{ steps.final_version.outputs.version }}.tar.gz
          overwrite_files: true
