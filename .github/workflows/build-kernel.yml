name: Reusable Kernel Build

on:
  workflow_call:
    inputs:
      kernel_repo:
        description: 'Kernel source repository URL or "stable" for latest stable from kernel.org'
        required: true
        type: string
      kernel_ref:
        description: 'Branch/tag/commit to checkout (ignored if kernel_repo is "stable")'
        required: false
        default: ''
        type: string
      config_file:
        description: 'Path to .config file in repo (e.g., "config")'
        required: false
        default: 'config'
        type: string
      release_tag_prefix:
        description: 'Prefix for release tag (e.g., "bbrv3-" or "v")'
        required: true
        type: string
      release_name_prefix:
        description: 'Prefix for release name'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        description: 'GitHub token for creating releases'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout repository (for config file)
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev libssl-dev libelf-dev \
            bison flex bc rsync debhelper dpkg-dev \
            fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils libdw-dev jq \
            git gcc-13

      - name: Obtain kernel source
        id: source
        env:
          KERNEL_REPO: ${{ inputs.kernel_repo }}
          KERNEL_REF: ${{ inputs.kernel_ref }}
        run: |
          if [[ "$KERNEL_REPO" == "stable" ]]; then
            RELEASES_JSON=$(curl -s https://www.kernel.org/releases.json)
            LATEST=$(echo "$RELEASES_JSON" | jq -r '.releases[] | select(.moniker == "stable") | .version' | sort -V | tail -1)
            DOWNLOAD_URL=$(echo "$RELEASES_JSON" | jq -r --arg ver "$LATEST" '.releases[] | select(.version == $ver) | .source')
            if [[ -z "$DOWNLOAD_URL" ]]; then
              echo "ERROR: Could not find download URL for version $LATEST"
              exit 1
            fi
            wget "$DOWNLOAD_URL"
            tar -xf linux-$LATEST.tar.xz
            mv linux-$LATEST linux-source
            echo "version=$LATEST" >> $GITHUB_OUTPUT
            echo "source_type=stable" >> $GITHUB_OUTPUT
          else
            if [[ -n "$KERNEL_REF" ]]; then
              git clone --depth 1 --branch "$KERNEL_REF" "$KERNEL_REPO" linux-source
            else
              git clone --depth 1 "$KERNEL_REPO" linux-source
            fi
            echo "source_type=git" >> $GITHUB_OUTPUT
          fi

      - name: Configure kernel
        working-directory: ./linux-source
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
        run: |
          CONFIG_PATH="../$CONFIG_FILE"
          if [[ ! -f "$CONFIG_PATH" ]]; then
            echo "ERROR: Config file not found: $CONFIG_PATH"
            exit 1
          fi
          cp "$CONFIG_PATH" .config
          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS
          make olddefconfig
          cp .config ../final.config

      - name: Get final kernel version
        id: final_version
        working-directory: ./linux-source
        run: |
          if [[ "${{ steps.source.outputs.source_type }}" == "stable" ]]; then
            FULL_VERSION="${{ steps.source.outputs.version }}"
          else
            FULL_VERSION=$(make kernelrelease)
          fi
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Final kernel version: $FULL_VERSION"

      - name: Compile kernel
        working-directory: ./linux-source
        run: |
          make -j$(nproc)
          make bindeb-pkg

      - name: Collect artifacts
        run: |
          version="${{ steps.final_version.outputs.version }}"
          mkdir -p debs
          find . -maxdepth 1 -type f -name 'linux-image-*.deb' ! -name '*dbg*' -exec mv {} debs/ \;
          find . -maxdepth 1 -type f -name 'linux-headers-*.deb' -exec mv {} debs/ \;
          if [[ -z $(ls debs/linux-image-*.deb 2>/dev/null) ]]; then
            echo "ERROR: Missing required .deb files"
            exit 1
          fi
          tar -czf kernel-${version}.tar.gz -C debs .
          tar -czf config-${version}.tar.gz final.config

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag_prefix }}${{ steps.final_version.outputs.version }}
          name: ${{ inputs.release_name_prefix }} ${{ steps.final_version.outputs.version }}
          body: |
            Built from ${{ inputs.kernel_repo == 'stable' && 'kernel.org' || inputs.kernel_repo }}
            ${{ inputs.kernel_repo != 'stable' && inputs.kernel_ref != '' && format('(ref: {0})', inputs.kernel_ref) || '' }}
            Configuration: `${{ inputs.config_file }}` from this repo.
          files: |
            kernel-${{ steps.final_version.outputs.version }}.tar.gz
            config-${{ steps.final_version.outputs.version }}.tar.gz
          overwrite_files: true
