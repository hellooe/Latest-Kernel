name: Build BBRv3 Kernel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  call-build:
    uses: ./.github/workflows/build-kernel.yml
    with:
      kernel_version: '6.17'
      apply_bbr3_patch: true
      config_file: 'config'
      release_tag_prefix: 'bbrv3-'
      release_name_prefix: 'BBRv3 Kernel'
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
